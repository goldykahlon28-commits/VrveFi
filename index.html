<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VrveFi — AI Personal Finance</title>
  <meta name="description" content="Track everyday expenses, manage budgets, and get AI-powered market updates and predictions." />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#2c5cdc" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="VrveFi" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%232c5cdc'/%3E%3Cpath d='M24 24L50 78' stroke='white' stroke-width='12' fill='none' stroke-linecap='round'/%3E%3Crect x='54' y='60' width='10' height='18' rx='3' fill='white'/%3E%3Crect x='67' y='46' width='10' height='32' rx='3' fill='white'/%3E%3Crect x='80' y='30' width='10' height='48' rx='3' fill='white'/%3E%3C/svg%3E" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">
          <svg viewBox="0 0 100 100" fill="none">
            <path d="M24 24L50 78" stroke="#fff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="54" y="60" width="10" height="18" rx="3" fill="#fff"/>
            <rect x="67" y="46" width="10" height="32" rx="3" fill="#fff"/>
            <rect x="80" y="30" width="10" height="48" rx="3" fill="#fff"/>
          </svg>
        </div>
        <div class="brand-text">
          <span class="brand-name">VrveFi</span>
          <span class="brand-tag">AI Finance</span>
        </div>
      </div>

      <nav class="nav">
        <div class="nav-sec">Money</div>
        <a class="nav-item" data-route="dashboard"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></span> Dashboard</a>
        <a class="nav-item" data-route="expenses"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 4h16v16l-2.5-1.5L15 20l-3-1.5L9 20l-2.5-1.5L4 20z"/><path d="M8 9h8M8 13h5"/></svg></span> Expenses</a>
        <a class="nav-item" data-route="budget"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 3a9 9 0 109 9h-9z"/><path d="M12 3v9h9"/></svg></span> Budgets</a>
        <a class="nav-item" data-route="savings"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12a6 4 0 0012 0 6 4 0 00-12 0z"/><path d="M3 12v4a6 4 0 0012 0v-4"/><path d="M15 10c2 0 3 1 3 2.5S17 15 16 15M7 9V7a3 2 0 016 0v1" stroke-linecap="round"/></svg></span> Savings</a>
        <div class="nav-sec">Markets</div>
        <a class="nav-item" data-route="market"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 16l5-5 4 4 7-8" stroke-linecap="round" stroke-linejoin="round"/><path d="M16 7h4v4" stroke-linecap="round" stroke-linejoin="round"/></svg></span> Market</a>
        <div class="nav-sec">Assist</div>
        <a class="nav-item" data-route="assistant"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 5h16v11H9l-4 3z" stroke-linejoin="round"/></svg></span> AI Assistant</a>
        <a class="nav-item" data-route="settings"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9l2.1 2.1M16.9 16.9l2.1 2.1M19.1 4.9l-2.1 2.1M6.9 16.9l-2.1 2.1"/></svg></span> Settings</a>
      </nav>

      <div class="sidebar-foot">
        <div class="health-card">
          <span class="health-label">Financial Health</span>
          <div class="health-score" id="sidebarHealth">—</div>
          <div class="health-bar"><div class="health-bar-fill" id="sidebarHealthBar"></div></div>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-toggle" id="menuToggle">☰</button>
          <div>
            <h1 class="page-title" id="pageTitle">Dashboard</h1>
            <p class="page-sub" id="pageSub">Your money, intelligently managed.</p>
          </div>
        </div>
        <div class="topbar-right">
          <div class="market-ticker" id="topTicker"></div>
          <button class="btn btn-primary" id="quickAdd">+ Add Expense</button>
          <div class="avatar" id="userAvatar">G</div>
        </div>
      </header>

      <section class="view" id="view"></section>
    </main>
  </div>

  <!-- Add / Edit expense modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-head">
        <h3 id="modalTitle">Add Expense</h3>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <form id="expenseForm" class="modal-body">
        <input type="hidden" id="exId" />
        <div class="form-row">
          <label>Description</label>
          <input type="text" id="exDesc" placeholder="e.g. Grocery run at Whole Foods" required />
        </div>
        <div class="form-grid">
          <div class="form-row">
            <label>Amount</label>
            <input type="number" id="exAmount" step="0.01" min="0" placeholder="0.00" required />
          </div>
          <div class="form-row">
            <label>Type</label>
            <select id="exType">
              <option value="expense">Expense</option>
              <option value="income">Income</option>
            </select>
          </div>
        </div>
        <div class="form-grid">
          <div class="form-row">
            <label>Category</label>
            <select id="exCategory"></select>
          </div>
          <div class="form-row">
            <label>Date</label>
            <input type="date" id="exDate" required />
          </div>
        </div>
        <div class="ai-hint" id="aiHint"></div>
        <div class="modal-foot">
          <button type="button" class="btn btn-ghost" id="modalCancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/data.js"></script>
  <script src="js/api.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/market.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
